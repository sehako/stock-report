<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <title>캔들차트 예제</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #111827;
      color: #e5e7eb;
      font-family: Arial, sans-serif;
    }

    .page {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      padding: 24px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
    }

    #chart {
      width: 100%;
      height: 600px;
      border: 1px solid #374151;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <div class="page">
    <h1>캔들차트 예제</h1>
    <div id="chart"></div>
  </div>

  <script src="https://unpkg.com/lightweight-charts@5.0.8/dist/lightweight-charts.standalone.production.js"></script>

  <script>
    const {
      createChart,
      CandlestickSeries,
      HistogramSeries,
      LineSeries,
      CrosshairMode,
    } = LightweightCharts;

    const chartContainer = document.getElementById('chart');

    const chart = createChart(chartContainer, {
      width: chartContainer.clientWidth,
      height: 600,
      layout: {
        background: { color: '#111827' },
        textColor: '#d1d5db',
      },
      grid: {
        vertLines: { color: '#1f2937' },
        horzLines: { color: '#1f2937' },
      },
      rightPriceScale: {
        borderColor: '#374151',
      },
      timeScale: {
        borderColor: '#374151',
      },
      crosshair: {
        mode: CrosshairMode.Normal,
      },
    });

    const candleSeries = chart.addSeries(CandlestickSeries, {
      upColor: '#ef4444',
      downColor: '#3b82f6',
      borderUpColor: '#ef4444',
      borderDownColor: '#3b82f6',
      wickUpColor: '#ef4444',
      wickDownColor: '#3b82f6',
    });

    const volumeSeries = chart.addSeries(HistogramSeries, {
      priceFormat: {
        type: 'volume',
      },
      priceScaleId: '',
    });

    volumeSeries.priceScale().applyOptions({
      scaleMargins: {
        top: 0.8,
        bottom: 0,
      },
    });

    const ma5Series = chart.addSeries(LineSeries, {
      lineWidth: 2,
      title: 'MA 5',
    });

    const ma20Series = chart.addSeries(LineSeries, {
      lineWidth: 2,
      title: 'MA 20',
    });

    const rawData = [
      {
        date: '2024-06-03',
        open: 74400,
        high: 76400,
        low: 74200,
        close: 75700,
        volume: 15706268,
        ma5: 74960,
        ma20: 73500,
      },
      {
        date: '2024-06-04',
        open: 74900,
        high: 76100,
        low: 74700,
        close: 75300,
        volume: 14098053,
        ma5: 75120,
        ma20: 73700,
      },
      {
        date: '2024-06-05',
        open: 75000,
        high: 75200,
        low: 73700,
        close: 74200,
        volume: 13542133,
        ma5: 74940,
        ma20: 73850,
      },
      {
        date: '2024-06-07',
        open: 74400,
        high: 75000,
        low: 73800,
        close: 73900,
        volume: 11687239,
        ma5: 74680,
        ma20: 73900,
      },
      {
        date: '2024-06-10',
        open: 74100,
        high: 75900,
        low: 74000,
        close: 75700,
        volume: 14598742,
        ma5: 74960,
        ma20: 74050,
      },
      {
        date: '2024-06-11',
        open: 75900,
        high: 76500,
        low: 75200,
        close: 75800,
        volume: 13124500,
        ma5: 74960,
        ma20: 74200,
      },
      {
        date: '2024-06-12',
        open: 76000,
        high: 77400,
        low: 75700,
        close: 77200,
        volume: 16830400,
        ma5: 75560,
        ma20: 74480,
      },
    ];

    const candleData = rawData.map(item => ({
      time: item.date,
      open: item.open,
      high: item.high,
      low: item.low,
      close: item.close,
    }));

    const volumeData = rawData.map(item => ({
      time: item.date,
      value: item.volume,
      color: item.close >= item.open ? '#ef444480' : '#3b82f680',
    }));

    const ma5Data = rawData
      .filter(item => item.ma5 != null)
      .map(item => ({
        time: item.date,
        value: item.ma5,
      }));

    const ma20Data = rawData
      .filter(item => item.ma20 != null)
      .map(item => ({
        time: item.date,
        value: item.ma20,
      }));

    candleSeries.setData(candleData);
    volumeSeries.setData(volumeData);
    ma5Series.setData(ma5Data);
    ma20Series.setData(ma20Data);

    chart.timeScale().fitContent();

    window.addEventListener('resize', () => {
      chart.applyOptions({
        width: chartContainer.clientWidth,
      });
    });
  </script>
</body>

</html>
